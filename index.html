<style>
  :root {
    --bg:#0a1f1e; --card:#16322f; --deep:#0d1f1d; --text:#eef5ff; --sub:#8fa4bd; --border:#27453f;

  }
  * { box-sizing:border-box; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); margin:0; min-height:100vh; overflow-x:hidden; }

  /* ── 최상단 허브 헤더 ── */
  .hub-header { background:linear-gradient(180deg,#0d2523,#0a1f1e); padding:22px 40px 0; border-bottom:1px solid var(--border); }
  .hub-title { font-size:24px; font-weight:800; color:var(--amber); letter-spacing:-0.5px; }
  .hub-title span { color:var(--sub); font-size:14px; font-weight:500; margin-left:12px; }
  /* 5개 대분류 최상위 탭 */
  .maintabs { display:flex; gap:12px; margin-top:20px; }
  .maintab { flex:1; text-align:center; padding:16px 10px 18px; border-radius:12px 12px 0 0; background:var(--card); border:1px solid var(--border); border-bottom:none; cursor:pointer; transition:all .16s; position:relative; }
  .maintab:hover { background:#1b3a37; }
  .maintab.active { background:var(--amber); }
  .maintab.active .mt-no, .maintab.active .mt-name { color:#1d1508; }
  .mt-no { font-size:12px; color:var(--sub); font-weight:700; letter-spacing:1px; }
  .mt-name { font-size:19px; font-weight:800; margin-top:3px; color:var(--text); }
  .mt-dot { position:absolute; top:12px; right:14px; width:9px; height:9px; border-radius:50%; }
  .dot-ok{background:var(--actual);} .dot-warn{background:var(--amber);} .dot-danger{background:var(--miss); animation:blink 1.6s infinite;}
  @keyframes blink { 50%{opacity:.4;} }

  /* ── 대시보드 프레임 영역 ── */
  .stage { min-height:calc(100vh - 130px); }
  iframe.dash { width:100%; height:calc(100vh - 118px); border:none; display:block; }

  /* ── 범용 렌더 대시보드 (공정 등) ── */
  .dv { display:none; }
  .dv.on { display:block; animation:fade .25s; }
  @keyframes fade { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
  .sub-head { display:flex; justify-content:space-between; align-items:center; padding:16px 36px 0; }
  .sub-h-title { font-size:15px; color:var(--sub); font-weight:600; }
  .sub-tabs { display:flex; gap:10px; padding:14px 36px 0; }
  .sub-tab { padding:11px 26px; border-radius:9px; background:var(--deep); border:1px solid var(--border); font-size:15px; font-weight:700; color:var(--sub); cursor:pointer; transition:all .15s; }
  .sub-tab:hover { color:var(--text); border-color:var(--sub); }
  .sub-tab.active { background:var(--amber); color:#1d1508; border-color:var(--amber); }
  .content { padding:20px 36px 40px; }
  .screen { display:none; }
  .screen.on { display:block; animation:fade .25s; }
  .panel-grid { display:flex; flex-wrap:wrap; gap:22px; align-items:stretch; }
  .panel { flex:1 1 46%; min-width:430px; background:var(--card); border-radius:16px; padding:24px; border:1px solid var(--border); box-shadow:0 10px 25px rgba(0,0,0,0.3); display:flex; flex-direction:column; }
.card { flex:1 1 46%; min-width:430px; background:var(--card); border-radius:16px; padding:24px; border:1px solid var(--border); box-shadow:0 10px 25px rgba(0,0,0,0.3); display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .card.miss { border:1.5px solid rgba(255,105,105,0.7); box-shadow:0 6px 22px rgba(255,105,105,0.18); }
  .card.miss::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--miss); }
  .card.amber { border:1.5px solid rgba(255,173,66,0.65); box-shadow:0 6px 22px rgba(255,173,66,0.18); }
  .card.amber::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--amber); }
  .card.ok { border:1.5px solid rgba(140,178,105,0.65); box-shadow:0 6px 22px rgba(140,178,105,0.18); }
  .card.ok::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--actual); }
  .panel-head { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--border); padding-bottom:14px; margin-bottom:16px; }
  .p-title { font-size:21px; font-weight:800; }
  .p-sub { color:var(--sub); font-size:13px; margin-top:5px; }
  .badge { padding:7px 14px; border-radius:8px; font-weight:800; font-size:14px; white-space:nowrap; }
  .st-ok{background:rgba(140,178,105,0.15);color:#a8d480;border:1px solid var(--actual);}
  .st-warn{background:rgba(255,173,66,0.13);color:#ffd08f;border:1px solid var(--amber);}
  .st-danger{background:rgba(255,105,105,0.15);color:#ffb3ad;border:1px solid var(--miss);animation:blink 1.6s infinite;}
  .num-dashboard { display:grid; grid-template-columns:repeat(4,1fr); gap:11px; margin-bottom:14px; }
  .num-box { background:var(--bg); border:1px solid var(--border); padding:14px 6px; border-radius:10px; text-align:center; }
  .num-lbl { font-size:12px; color:var(--sub); font-weight:700; margin-bottom:6px; word-break:keep-all; }
  .num-val { font-size:20px; font-weight:800; }
  .num-box.ok{border-color:rgba(140,178,105,0.5);background:rgba(140,178,105,0.05);} .num-box.ok .num-val{color:#a8d480;}
  .num-box.warn{border-color:rgba(255,173,66,0.55);background:rgba(255,173,66,0.05);} .num-box.warn .num-val{color:#ffd08f;}
  .num-box.danger{border-color:rgba(255,105,105,0.7);background:rgba(255,105,105,0.08);} .num-box.danger .num-val{color:#ff8f7a;}
  .warning-msg { padding:13px 17px; border-radius:8px; font-size:14px; margin-bottom:14px; line-height:1.55; font-weight:600; }
  .warning-msg.safe{background:rgba(140,178,105,0.1);border:1px solid var(--actual);color:#c9e0a8;}
  .warning-msg.warn{background:rgba(255,173,66,0.09);border:1px solid var(--amber);color:#ffd9a3;}
  .warning-msg.danger{background:rgba(255,105,105,0.13);border:2px solid var(--miss);color:#ffb3ad;}
  .chart-container { flex-grow:1; min-height:240px; background:var(--deep); border-radius:12px; padding:16px; border:1px solid var(--border); }
  .custom-legend { display:flex; justify-content:center; gap:18px; margin-bottom:10px; font-size:12.5px; font-weight:bold; flex-wrap:wrap; }
  .svg-canvas { width:100%; height:calc(100% - 26px); min-height:190px; }
  .tracker-box { background:var(--deep); border-radius:10px; padding:16px; border:1px solid var(--border); margin-bottom:14px; }
  .tracker-title { font-size:13.5px; color:var(--sub); margin-bottom:12px; font-weight:700; }
  .task-list { display:flex; flex-direction:column; gap:9px; }
  .task-item { display:flex; align-items:center; gap:12px; font-size:14px; background:var(--card); padding:11px 16px; border-radius:8px; border-left:4px solid var(--sub); font-weight:500; justify-content:space-between; flex-wrap:wrap; }
  .task-item .left { display:flex; align-items:center; gap:10px; }
  .task-item.done{border-left-color:var(--actual);} .task-item.warn{border-left-color:var(--amber);background:rgba(255,173,66,0.06);} .task-item.fail{border-left-color:var(--miss);background:rgba(255,105,105,0.1);}

  .note { font-size:11.5px; color:var(--sub); margin-top:14px; text-align:right; font-style:italic; }

  .scn-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .scn-lbl { font-size:13px; color:var(--sub); font-weight:700; margin-right:4px; width:100%; margin-bottom:2px; }
  .scn-btn { padding:10px 22px; border-radius:10px; background:var(--deep); border:1.5px solid var(--border); font-size:15px; font-weight:800; color:var(--sub); cursor:pointer; transition:all .14s; }

  .scn-btn.active { background:var(--amber); color:#1d1508; border-color:var(--amber); box-shadow:0 4px 12px rgba(255,173,66,0.3); }

  .sim-table .loss-cell { color:#ff8f7a; font-weight:800; font-size:15px; }

  .loss-bar-wrap { display:flex; align-items:center; gap:10px; padding:8px 12px; }
  .loss-bar-track { flex:1; height:22px; background:var(--bg); border-radius:5px; overflow:hidden; position:relative; border:1px solid var(--border); }
  .loss-bar-fill { height:100%; background:linear-gradient(90deg, #ff6969, #ff8f7a); border-radius:4px; transition:width .35s ease; }
  .loss-bar-val { color:#ff8f7a; font-weight:800; font-size:15px; white-space:nowrap; min-width:56px; text-align:right; }
  .sim-table .sum-row .loss-bar-fill { background:linear-gradient(90deg, #ffad42, #ffd08f); }
  .sim-table .sum-row .loss-bar-val { color:#ffd08f; }
  .sim-table .sum-row td { background:rgba(255,105,105,0.09); border-top:2px solid var(--miss); border-bottom:none; font-size:15px; font-weight:800; padding:14px 12px; }
  .sim-table .sum-row td:first-child { color:var(--amber); }
  .sim-table .sum-row .loss-cell { font-size:18px; }
  .sim-rate-badge { display:inline-block; background:rgba(255,173,66,0.15); color:#ffd08f; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700; margin-left:6px; }
  .placeholder { text-align:center; padding:120px 20px; color:var(--sub); }
  .placeholder .big { font-size:22px; font-weight:800; color:var(--text); margin-bottom:10px; }
  @media (max-width:980px){ .panel{min-width:100%;} .maintabs{flex-wrap:wrap;} .maintab{flex:1 1 30%;} .content,.sub-tabs,.sub-head{padding-left:16px;padding-right:16px;} .num-dashboard{grid-template-columns:repeat(2,1fr);} }
</style>

&lt;/script&gt;
&lt;script&gt;
  /* ══════════ 유틸 ══════════ */
  const $ = id =&gt; document.getElementById(id);
  const fmt = v =&gt; v.toLocaleString();
  const T = (tpl, vars) =&gt; (tpl||&#x27;&#x27;).replace(/\{(.+?)\}/g, (m,k)=&gt; vars[k]!==undefined ? vars[k] : m);
  const BADGE = { ok:[&#x27;st-ok&#x27;,&#x27;🟢&#x27;], warn:[&#x27;st-warn&#x27;,&#x27;🟡&#x27;], danger:[&#x27;st-danger&#x27;,&#x27;🚨&#x27;] };
  function setBadge(id, level, text){ const el=$(id); el.className=&#x27;badge &#x27;+BADGE[level][0]; el.textContent=BADGE[level][1]+&#x27; &#x27;+text; }
  function setMsg(id, level, html){ const el=$(id); el.className=&#x27;warning-msg &#x27;+(level===&#x27;ok&#x27;?&#x27;safe&#x27;:level); el.innerHTML=&#x27;&lt;div&gt;&#x27;+html+&#x27;&lt;/div&gt;&#x27;; }
  function setCatStatus(id, level, text){ const el=$(id); el.className=&#x27;cat-status &#x27;+BADGE[level][0]; el.textContent=text; }
  function taskItem(st, name, amtText, amtCls){
    const icon = st===&#x27;done&#x27; ? &#x27;&lt;span class=&quot;icon-done&quot;&gt;✔&lt;/span&gt;&#x27; : st===&#x27;warn&#x27; ? &#x27;&lt;span class=&quot;icon-warn&quot;&gt;●&lt;/span&gt;&#x27; : &#x27;&lt;span class=&quot;icon-fail&quot;&gt;⚠&lt;/span&gt;&#x27;;
    const nm = st===&#x27;fail&#x27; ? `&lt;strong style=&quot;color:#ffb3ad&quot;&gt;${name}&lt;/strong&gt;` : name;
    return `&lt;div class=&quot;task-item ${st}&quot;&gt;&lt;div class=&quot;left&quot;&gt;${icon} ${nm}&lt;/div&gt;&lt;span class=&quot;amt ${amtCls||&#x27;&#x27;}&quot;&gt;${amtText}&lt;/span&gt;&lt;/div&gt;`;
  }

  /* ══════════ 차트 엔진 ══════════ */
  function lineChart(id, series, maxY, labels) {
    const w=600, h=215, padX=30, padY=22, dw=w-padX*2, dh=h-padY*2, n=labels.length;
    const xs=i=&gt;padX+i*(dw/(n-1)), ys=v=&gt;padY+dh-(v/maxY)*dh;
    let grid=&#x27;&#x27;, lbl=&#x27;&#x27;;
    labels.forEach((m,i)=&gt;{ grid+=`&lt;line x1=&quot;${xs(i)}&quot; y1=&quot;${padY}&quot; x2=&quot;${xs(i)}&quot; y2=&quot;${padY+dh}&quot; stroke=&quot;#16322f&quot; stroke-width=&quot;1&quot;/&gt;`;
      lbl+=`&lt;text x=&quot;${xs(i)}&quot; y=&quot;${h-3}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;10.5&quot; text-anchor=&quot;middle&quot;&gt;${m}&lt;/text&gt;`; });
    let paths=&#x27;&#x27;, dots=&#x27;&#x27;, vt=&#x27;&#x27;;
    series.forEach(s=&gt;{
      let d=&#x27;&#x27;, seen=0;
      s.data.forEach((v,i)=&gt;{
        if(v===null||v===undefined) return;
        d+=(d?&#x27; L&#x27;:&#x27;M&#x27;)+` ${xs(i)} ${ys(v)}`;
        if(s.dots) dots+=`&lt;circle cx=&quot;${xs(i)}&quot; cy=&quot;${ys(v)}&quot; r=&quot;3.5&quot; fill=&quot;${s.color}&quot; stroke=&quot;#0d1f1d&quot; stroke-width=&quot;2&quot;/&gt;`;
        if(s.vlab){ seen++;
          if(!(s.vskip &amp;&amp; seen&lt;=s.vskip)){
            const txt = s.lab ? s.lab[i] : fmt(v);
            vt+=`&lt;text x=&quot;${xs(i)}&quot; y=&quot;${s.below?ys(v)+17:ys(v)-9}&quot; fill=&quot;${s.color}&quot; font-size=&quot;9.5&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;${txt}&lt;/text&gt;`;
          } }
      });
      paths+=`&lt;path d=&quot;${d}&quot; stroke=&quot;${s.color}&quot; stroke-width=&quot;${s.width||2.5}&quot; fill=&quot;none&quot; stroke-dasharray=&quot;${s.dash||&#x27;&#x27;}&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;`;
    });
    $(id).innerHTML=`&lt;svg viewBox=&quot;0 0 ${w} ${h}&quot; width=&quot;100%&quot; height=&quot;100%&quot; preserveAspectRatio=&quot;none&quot;&gt;${grid}${paths}${dots}${vt}${lbl}&lt;/svg&gt;`;
  }
  function barChart(id, data, labels, color) {
    const maxY=Math.max(...data)*1.25, w=600, h=215, padX=30, padY=18, dw=w-padX*2, dh=h-padY*2, bw=dw/data.length*0.55;
    let bars=&#x27;&#x27;, lbl=&#x27;&#x27;;
    data.forEach((v,i)=&gt;{
      const x=padX+i*(dw/data.length)+(dw/data.length-bw)/2, bh=(v/maxY)*dh;
      bars+=`&lt;rect x=&quot;${x}&quot; y=&quot;${padY+dh-bh}&quot; width=&quot;${bw}&quot; height=&quot;${bh}&quot; rx=&quot;4&quot; fill=&quot;${color}&quot; opacity=&quot;0.85&quot;/&gt;`;
      bars+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${padY+dh-bh-6}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;11&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;${fmt(v)}&lt;/text&gt;`;
      lbl+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${h-3}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;10.5&quot; text-anchor=&quot;middle&quot;&gt;${labels[i]}&lt;/text&gt;`;
    });
    $(id).innerHTML=`&lt;svg viewBox=&quot;0 0 ${w} ${h}&quot; width=&quot;100%&quot; height=&quot;100%&quot; preserveAspectRatio=&quot;none&quot;&gt;${bars}${lbl}&lt;/svg&gt;`;
  }
  // 막대별 색상 지정 + 마지막 막대 위에 연말추정 점선/라벨
  function barChartColored(id, data, labels, colors, projVal) {
    const maxY=Math.max(...data, projVal||0)*1.22, w=600, h=215, padX=30, padY=22, dw=w-padX*2, dh=h-padY*2, bw=dw/data.length*0.5;
    const ys=v=&gt;padY+dh-(v/maxY)*dh;
    let bars=&#x27;&#x27;, lbl=&#x27;&#x27;;
    data.forEach((v,i)=&gt;{
      const x=padX+i*(dw/data.length)+(dw/data.length-bw)/2, bh=(v/maxY)*dh;
      bars+=`&lt;rect x=&quot;${x}&quot; y=&quot;${padY+dh-bh}&quot; width=&quot;${bw}&quot; height=&quot;${bh}&quot; rx=&quot;4&quot; fill=&quot;${colors[i]}&quot; opacity=&quot;0.88&quot;/&gt;`;
      bars+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${padY+dh-bh-6}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;11&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;${fmt(v)}&lt;/text&gt;`;
      lbl+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${h-3}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;10.5&quot; text-anchor=&quot;middle&quot;&gt;${labels[i]}&lt;/text&gt;`;
    });
    // 연말 추정: 마지막(올해) 막대 위에 점선 + 라벨
    if(projVal){
      const li = data.length-1;
      const cx = padX + li*(dw/data.length) + (dw/data.length)/2;
      const py = ys(projVal);
      const x0 = padX + li*(dw/data.length) + (dw/data.length-bw)/2 - 6;
      bars+=`&lt;line x1=&quot;${x0}&quot; y1=&quot;${py}&quot; x2=&quot;${x0+bw+12}&quot; y2=&quot;${py}&quot; stroke=&quot;#ff6969&quot; stroke-width=&quot;2&quot; stroke-dasharray=&quot;5,4&quot;/&gt;`;
      bars+=`&lt;text x=&quot;${cx}&quot; y=&quot;${py-7}&quot; fill=&quot;#ff8f7a&quot; font-size=&quot;11&quot; font-weight=&quot;800&quot; text-anchor=&quot;middle&quot;&gt;연말추정 ${fmt(projVal)}&lt;/text&gt;`;
    }
    $(id).innerHTML=`&lt;svg viewBox=&quot;0 0 ${w} ${h}&quot; width=&quot;100%&quot; height=&quot;100%&quot; preserveAspectRatio=&quot;none&quot;&gt;${bars}${lbl}&lt;/svg&gt;`;
  }
  function comboChart(id, bars, line, maxY, labels) {
    const w=600, h=215, padX=30, padY=22, dw=w-padX*2, dh=h-padY*2, slot=dw/bars.data.length, bw=slot*0.5;
    const ys=v=&gt;padY+dh-(v/maxY)*dh;
    let el=&#x27;&#x27;, lbl=&#x27;&#x27;;
    bars.data.forEach((v,i)=&gt;{
      const x=padX+i*slot+(slot-bw)/2, bh=(v/maxY)*dh;
      el+=`&lt;rect x=&quot;${x}&quot; y=&quot;${padY+dh-bh}&quot; width=&quot;${bw}&quot; height=&quot;${bh}&quot; rx=&quot;4&quot; fill=&quot;${bars.color}&quot; opacity=&quot;0.6&quot;/&gt;`;
      el+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${padY+dh-bh-5}&quot; fill=&quot;#a9bdd6&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;${v}&lt;/text&gt;`;
      lbl+=`&lt;text x=&quot;${x+bw/2}&quot; y=&quot;${h-3}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;10.5&quot; text-anchor=&quot;middle&quot;&gt;${labels[i]}&lt;/text&gt;`;
    });
    let d=&#x27;&#x27;, dots=&#x27;&#x27;, vt=&#x27;&#x27;;
    line.data.forEach((v,i)=&gt;{
      const cx=padX+i*slot+slot/2, cy=ys(v*line.scale);
      d+=(d?&#x27; L&#x27;:&#x27;M&#x27;)+` ${cx} ${cy}`;
      dots+=`&lt;circle cx=&quot;${cx}&quot; cy=&quot;${cy}&quot; r=&quot;3.5&quot; fill=&quot;${line.color}&quot; stroke=&quot;#0d1f1d&quot; stroke-width=&quot;2&quot;/&gt;`;
      vt+=`&lt;text x=&quot;${cx}&quot; y=&quot;${cy-9}&quot; fill=&quot;${line.color}&quot; font-size=&quot;10&quot; font-weight=&quot;800&quot; text-anchor=&quot;middle&quot;&gt;${line.lab[i]}&lt;/text&gt;`;
    });
    el+=`&lt;path d=&quot;${d}&quot; stroke=&quot;${line.color}&quot; stroke-width=&quot;3&quot; fill=&quot;none&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;`+dots+vt;
    $(id).innerHTML=`&lt;svg viewBox=&quot;0 0 ${w} ${h}&quot; width=&quot;100%&quot; height=&quot;100%&quot; preserveAspectRatio=&quot;none&quot;&gt;${el}${lbl}&lt;/svg&gt;`;
  }
  function donutChart(id, segs, centerLabel) {
    const w=560, h=210, cx=120, cy=105, R=76, r=45;
    const total=segs.reduce((s,x)=&gt;s+x.v,0);
    let a0=-Math.PI/2, paths=&#x27;&#x27;, pcts=&#x27;&#x27;;
    segs.forEach(s=&gt;{
      const frac=s.v/total, a1=a0+frac*2*Math.PI-0.02, large=frac&gt;0.5?1:0;
      const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0), x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
      const xi1=cx+r*Math.cos(a1), yi1=cy+r*Math.sin(a1), xi0=cx+r*Math.cos(a0), yi0=cy+r*Math.sin(a0);
      paths+=`&lt;path d=&quot;M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z&quot; fill=&quot;${s.c}&quot; opacity=&quot;0.92&quot;/&gt;`;
      const am=(a0+a1)/2;
      pcts+=`&lt;text x=&quot;${cx+(R+17)*Math.cos(am)}&quot; y=&quot;${cy+(R+17)*Math.sin(am)+4}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;12.5&quot; font-weight=&quot;800&quot; text-anchor=&quot;middle&quot;&gt;${Math.round(frac*100)}%&lt;/text&gt;`;
      a0=a1+0.02;
    });
    let leg=&#x27;&#x27;, ly0=52;
    segs.forEach(s=&gt;{
      leg+=`&lt;rect x=&quot;285&quot; y=&quot;${ly0-11}&quot; width=&quot;13&quot; height=&quot;13&quot; rx=&quot;3&quot; fill=&quot;${s.c}&quot;/&gt;`;
      leg+=`&lt;text x=&quot;308&quot; y=&quot;${ly0}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;14&quot; font-weight=&quot;700&quot;&gt;${s.n}&lt;/text&gt;`;
      leg+=`&lt;text x=&quot;545&quot; y=&quot;${ly0}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;13&quot; text-anchor=&quot;end&quot;&gt;${fmt(s.v)}억 · ${Math.round(s.v/total*100)}%&lt;/text&gt;`;
      ly0+=34;
    });
    const center=`&lt;text x=&quot;${cx}&quot; y=&quot;${cy-6}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;${centerLabel}&lt;/text&gt;
                  &lt;text x=&quot;${cx}&quot; y=&quot;${cy+16}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;17&quot; font-weight=&quot;800&quot; text-anchor=&quot;middle&quot;&gt;${fmt(total)}억&lt;/text&gt;`;
    $(id).innerHTML=`&lt;svg viewBox=&quot;0 0 ${w} ${h}&quot; width=&quot;100%&quot; height=&quot;100%&quot;&gt;${paths}${pcts}${center}${leg}&lt;/svg&gt;`;
  }

  /* ══════════ 네비게이션 ══════════ */
  const SUBS = {
    1:[{id:&#x27;1-1&#x27;,name:&#x27;1.1 입찰관리&#x27;},{id:&#x27;1-2&#x27;,name:&#x27;1.2 수주 건전성&#x27;}],
    2:[{id:&#x27;2-1&#x27;,name:&#x27;2.1 잔고 적정성&#x27;},{id:&#x27;2-2&#x27;,name:&#x27;2.2 잔고 추이 전망&#x27;}],
    3:[{id:&#x27;3-1&#x27;,name:&#x27;3.1 초기분양 감지&#x27;},{id:&#x27;3-2&#x27;,name:&#x27;3.2 PF 전이 리스크&#x27;}],
  };
  function selectCat(c){
    document.querySelectorAll(&#x27;.cat-tab&#x27;).forEach((el,i)=&gt;el.classList.toggle(&#x27;active&#x27;,i===c-1));
    const box=$(&#x27;subtabs&#x27;); box.innerHTML=&#x27;&#x27;;
    SUBS[c].forEach(s=&gt;{ const b=document.createElement(&#x27;div&#x27;); b.className=&#x27;sub-tab&#x27;; b.textContent=s.name; b.id=&#x27;tab-&#x27;+s.id; b.onclick=()=&gt;selectSub(s.id); box.appendChild(b); });
    selectSub(SUBS[c][0].id);
  }
  function selectSub(id){
    document.querySelectorAll(&#x27;.sub-tab&#x27;).forEach(el=&gt;el.classList.toggle(&#x27;active&#x27;,el.id===&#x27;tab-&#x27;+id));
    document.querySelectorAll(&#x27;.view&#x27;).forEach(el=&gt;el.classList.toggle(&#x27;on&#x27;,el.id===&#x27;v-&#x27;+id));
  }

  /* ══════════ 렌더링 (DATA → 화면) ══════════ */
  function render(){
    const D=DATA, mm=D.기준월;
    const M_ALL=[&#x27;1월&#x27;,&#x27;2월&#x27;,&#x27;3월&#x27;,&#x27;4월&#x27;,&#x27;5월&#x27;,&#x27;6월&#x27;,&#x27;7월&#x27;,&#x27;8월&#x27;,&#x27;9월&#x27;,&#x27;10월&#x27;,&#x27;11월&#x27;,&#x27;12월&#x27;];
    const M_ACT=M_ALL.slice(0,mm);
    $(&#x27;hd-date&#x27;).textContent = `${D.기준연도}년 ${mm}월 마감 기준`;
    $(&#x27;hd-title&#x27;).textContent = D.헤더제목 || &#x27;01 수주 — 선행지표 대시보드&#x27;;
    $(&#x27;hd-sub&#x27;).textContent = &#x27;| &#x27; + (D.헤더부제 || &#x27;&#x27;);
    [1,2,3].forEach(i=&gt;{ $(&#x27;cdesc-&#x27;+i).textContent = (D.대분류설명&amp;&amp;D.대분류설명[i])||&#x27;&#x27;; });

    /* ── 1.1 입찰 ── */
    const B=D.입찰;
    const 참여=B.월별참여.reduce((a,b)=&gt;a+b,0), 성공=B.수주건수_인프라+B.수주건수_건축;
    const 전환율=B.누계전환율[B.누계전환율.length-1];
    $(&#x27;bid-sub&#x27;).textContent=`${mm}월 누계 | ${B.부제||&#x27;&#x27;}`;
    setBadge(&#x27;bid-badge&#x27;, B.상태, B.상태===&#x27;ok&#x27;?&#x27;정상&#x27;:B.상태===&#x27;warn&#x27;?&#x27;주의&#x27;:&#x27;경보&#x27;);
    $(&#x27;pnl-bid&#x27;).style.borderTop=&#x27;5px solid var(--&#x27;+(B.상태===&#x27;ok&#x27;?&#x27;actual&#x27;:B.상태===&#x27;warn&#x27;?&#x27;amber&#x27;:&#x27;miss&#x27;)+&#x27;)&#x27;;
    $(&#x27;bid-n1&#x27;).textContent=참여+&#x27;건&#x27;;
    $(&#x27;bid-n2&#x27;).innerHTML=`${성공}건 &lt;small&gt;인프라${B.수주건수_인프라}·건축${B.수주건수_건축}&lt;/small&gt;`;
    $(&#x27;bid-n3&#x27;).textContent=전환율+&#x27;%&#x27;;
    $(&#x27;bid-n4&#x27;).textContent=B.전년동기_전환율+&#x27;%&#x27;;
    setMsg(&#x27;bid-msg&#x27;, B.상태, `&lt;strong&gt;[${B.상태===&#x27;ok&#x27;?&#x27;정상&#x27;:&#x27;주의&#x27;}]&lt;/strong&gt; ${B.상태문구}`);
    const 성공합=B.성공현장.reduce((a,x)=&gt;a+x.금액,0);
    $(&#x27;bid-list-title&#x27;).textContent=`금년 수주 성공 현장 (${성공}건 · ${fmt(성공합)}억)`;
    $(&#x27;bid-list&#x27;).innerHTML=B.성공현장.map(x=&gt;taskItem(x.상태,x.이름,fmt(x.금액)+&#x27;억&#x27;,x.상태===&#x27;done&#x27;?&#x27;green&#x27;:&#x27;&#x27;)).join(&#x27;&#x27;);
    comboChart(&#x27;svg-bid&#x27;, {data:B.월별참여,color:&#x27;#7e93ab&#x27;},
      {data:B.누계전환율, scale:14, color:&#x27;#8cb269&#x27;, lab:B.누계전환율.map(v=&gt;v+&#x27;%&#x27;)},
      Math.max(...B.월별참여)*1.35, M_ACT);

    /* 파이프라인 — 과거 실적 + 연말 착지 전망 */
    const P=D.파이프라인;
    setBadge(&#x27;pipe-badge&#x27;, P.상태, P.상태===&#x27;ok&#x27;?&#x27;정상&#x27;:P.상태===&#x27;warn&#x27;?&#x27;주의&#x27;:&#x27;경보&#x27;);
    $(&#x27;pipe-sub&#x27;).textContent=P.부제||&#x27;&#x27;; $(&#x27;pipe-note&#x27;).textContent=P.하단주석||&#x27;&#x27;;
    $(&#x27;pipe-n1&#x27;).innerHTML=`${P.올해_수주}건 &lt;small&gt;/ 참여 ${P.올해_참여}건&lt;/small&gt;`;
    $(&#x27;pipe-n2&#x27;).textContent=fmt(P.올해_수주액)+&#x27;억&#x27;;
    $(&#x27;pipe-n3&#x27;).innerHTML=`${P.연말추정_수주}건 &lt;small&gt;${fmt(P.연말추정_수주액)}억&lt;/small&gt;`;
    $(&#x27;pipe-n4&#x27;).textContent=fmt(P.과거평균_수주액)+&#x27;억&#x27;;
    setMsg(&#x27;pipe-msg&#x27;, P.상태, `&lt;strong&gt;[${P.상태===&#x27;ok&#x27;?&#x27;정상&#x27;:P.상태===&#x27;warn&#x27;?&#x27;주의&#x27;:&#x27;경보&#x27;}]&lt;/strong&gt; ${P.상태문구}`);
    // 차트: 과거3년 + 올해누계 + 연말추정 (막대 + 추정점선)
    const pipeLabels = [...P.과거실적.map(x=&gt;x.연도), &#x27;26년&#x27;];
    const pipeVals = [...P.과거실적.map(x=&gt;x.수주액), P.올해_수주액];
    const pipeColors = [...P.과거실적.map(()=&gt; &#x27;#7e93ab&#x27;), &#x27;#ffad42&#x27;];
    barChartColored(&#x27;svg-pipe&#x27;, pipeVals, pipeLabels, pipeColors, P.연말추정_수주액);
    $(&#x27;pnl-pipe&#x27;).style.borderTop=&#x27;5px solid var(--amber)&#x27;;

    /* ── 1.2 SPI + MIX ── */
    const S=D.SPI, cur=S.분기값[S.분기값.length-1], prev=S.분기값[S.분기값.length-2];
    const spiLv = cur&lt;S.경보선?&#x27;danger&#x27;:cur&lt;=S.기준선+2?&#x27;warn&#x27;:&#x27;ok&#x27;;
    setBadge(&#x27;spi-badge&#x27;, spiLv, spiLv===&#x27;ok&#x27;?&#x27;정상&#x27;:spiLv===&#x27;warn&#x27;?&#x27;기준선 근접&#x27;:&#x27;기준선 하회&#x27;);
    $(&#x27;spi-sub&#x27;).textContent=S.부제||&#x27;&#x27;; $(&#x27;spi-note&#x27;).textContent=S.하단주석||&#x27;&#x27;;
    $(&#x27;spi-l1&#x27;).textContent=S.분기라벨[S.분기라벨.length-1]+&#x27; SPI&#x27;;
    $(&#x27;spi-n1&#x27;).textContent=cur+&#x27;점&#x27;;
    $(&#x27;spi-n2&#x27;).textContent=(cur-prev&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+(cur-prev)+&#x27;점&#x27;;
    $(&#x27;spi-n3&#x27;).textContent=S.기준선+&#x27;점&#x27;;
    $(&#x27;spi-n4&#x27;).textContent=S.최저구성_이름+&#x27; &#x27;+S.최저구성_점수+&#x27;점&#x27;;
    $(&#x27;spi-msg&#x27;).innerHTML=`&lt;strong&gt;[주의]&lt;/strong&gt; ${S.상태문구}`;
    $(&#x27;spi-lg1&#x27;).textContent=`╌╌ 기준선(${S.기준선})`;
    $(&#x27;spi-lg2&#x27;).textContent=`- - 경보선(${S.경보선})`;
    lineChart(&#x27;svg-spi&#x27;,[
      {data:S.분기값.map(()=&gt;S.기준선), color:&#x27;#7e93ab&#x27;, dash:&#x27;5,5&#x27;},
      {data:S.분기값.map(()=&gt;S.경보선), color:&#x27;#ff6969&#x27;, dash:&#x27;4,4&#x27;},
      {data:S.분기값, color:&#x27;#8cb269&#x27;, dots:true, width:3, vlab:true, lab:S.분기값.map(String)},
    ], Math.max(...S.분기값)*1.2, S.분기라벨);

    const X=D.MIX, mix계=X.토목+X.건축+X.주택;
    $(&#x27;mix-sub&#x27;).textContent=X.라벨;
    $(&#x27;mix-cmp-title&#x27;).textContent=X.비교제목||&#x27;&#x27;; $(&#x27;mix-note&#x27;).textContent=X.하단주석||&#x27;&#x27;;
    $(&#x27;mix-n1&#x27;).textContent=fmt(mix계)+&#x27;억&#x27;;
    $(&#x27;mix-n2&#x27;).textContent=Math.round(X.토목/mix계*100)+&#x27;%&#x27;;
    $(&#x27;mix-n3&#x27;).textContent=Math.round(X.건축/mix계*100)+&#x27;%&#x27;;
    $(&#x27;mix-n4&#x27;).textContent=Math.round(X.주택/mix계*100)+&#x27;%&#x27;;
    donutChart(&#x27;svg-mixdonut&#x27;,[
      {n:&#x27;토목(인프라)&#x27;,v:X.토목,c:&#x27;#8cb269&#x27;},{n:&#x27;건축&#x27;,v:X.건축,c:&#x27;#ffad42&#x27;},{n:&#x27;주택&#x27;,v:X.주택,c:&#x27;#7e93ab&#x27;},
    ],&#x27;누계 계&#x27;);
    $(&#x27;mix-bars&#x27;).innerHTML =
      X.업계비교.map(g=&gt;`&lt;div class=&quot;hbar-row&quot;&gt;&lt;div class=&quot;hbar-name&quot;&gt;${g.이름}&lt;/div&gt;&lt;div class=&quot;hbar-track&quot;&gt;&lt;div class=&quot;hbar-fill&quot; style=&quot;width:${g.값}%;background:#7e93ab;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;hbar-val&quot;&gt;${g.값}%&lt;/div&gt;&lt;/div&gt;`).join(&#x27;&#x27;)
      + `&lt;div class=&quot;hbar-row&quot; style=&quot;margin-bottom:0;&quot;&gt;&lt;div class=&quot;hbar-name&quot; style=&quot;color:#ffd08f;&quot;&gt;당사&lt;/div&gt;&lt;div class=&quot;hbar-track&quot;&gt;&lt;div class=&quot;hbar-fill&quot; style=&quot;width:${D.MIX.당사_주택비중}%;background:#ffad42;&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;hbar-val&quot; style=&quot;color:#ffd08f;&quot;&gt;${D.MIX.당사_주택비중}%&lt;/div&gt;&lt;/div&gt;`;

    /* ── 2.1 / 2.2 잔고 (부문 공통 렌더 함수) ── */
    function renderBal(K, ids){
      const 적정=K.목표매출*K.공사기간;
      const 현재=K.월별잔고[K.월별잔고.length-1], 전월=K.월별잔고[K.월별잔고.length-2];
      const 증감=현재-전월, 부족=적정-현재;
      $(ids.sub).textContent=`목표매출 ${fmt(K.목표매출)}억 × 공사기간 ${K.공사기간}년 = 적정잔고 ${fmt(적정)}억`;
      $(ids.n1).textContent=fmt(전월)+&#x27;억&#x27;;
      $(ids.n2).textContent=(증감&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+fmt(증감)+&#x27;억&#x27;;
      $(ids.n3).textContent=fmt(현재)+&#x27;억&#x27;;
      if(부족&gt;0){
        setBadge(ids.badge,&#x27;danger&#x27;,&#x27;부족&#x27;);
        $(ids.pnl).style.borderTop=&#x27;5px solid var(--miss)&#x27;;
        $(ids.b4).className=&#x27;num-box danger live&#x27;; $(ids.l4).textContent=&#x27;적정 대비 부족분&#x27;; $(ids.n4).textContent=fmt(부족)+&#x27;억&#x27;;
        setMsg(ids.msg,&#x27;danger&#x27;,`&lt;strong&gt;[센서 경보]&lt;/strong&gt; `+T(K.경보문구,{적정:fmt(적정),비율:(현재/적정*100).toFixed(1),부족:fmt(부족),공사기간:K.공사기간}));
      } else {
        setBadge(ids.badge,&#x27;ok&#x27;,&#x27;충족&#x27;);
        $(ids.pnl).style.borderTop=&#x27;5px solid var(--actual)&#x27;;
        $(ids.b4).className=&#x27;num-box ok&#x27;; $(ids.l4).textContent=&#x27;적정 대비&#x27;; $(ids.n4).textContent=&#x27;+&#x27;+fmt(-부족)+&#x27;억&#x27;;
        setMsg(ids.msg,&#x27;ok&#x27;,`&lt;strong&gt;[정상]&lt;/strong&gt; `+T(K.정상문구,{적정:fmt(적정),비율:(현재/적정*100).toFixed(1),부족:fmt(-부족),공사기간:K.공사기간}));
      }
      $(ids.lg).textContent=`╌╌ 적정 수주잔고(${fmt(적정)}억)`;
      lineChart(ids.chart,[
        {data:K.월별잔고.map(()=&gt;적정), color:&#x27;#7e93ab&#x27;, dash:&#x27;5,5&#x27;},
        {data:K.월별잔고, color:&#x27;#8cb269&#x27;, dots:true, width:3, vlab:true},
      ], 적정*1.15, M_ACT);
      return {적정,현재};
    }
    function renderProj(K, ids, base){
      /* 추정 궤적 자동 계산: 현재잔고 - 월기성 + 수주예정 */
      const traj=[base.현재]; let bal=base.현재;
      K.수주예정.forEach(nw=&gt;{ bal = bal - K.월평균기성 + nw; traj.push(bal); });
      const 연말=traj[traj.length-1], 필요=Math.max(0, base.적정-연말);
      const 수주합=K.수주예정.reduce((a,b)=&gt;a+b,0);
      const lv = 필요&lt;=0?&#x27;ok&#x27;:필요&gt;=3000?&#x27;danger&#x27;:&#x27;warn&#x27;;
      setBadge(ids.badge, lv, lv===&#x27;ok&#x27;?&#x27;적정 유지&#x27;:lv===&#x27;warn&#x27;?&#x27;연말 이탈 예상&#x27;:&#x27;이탈 확대&#x27;);
      $(ids.pnl).style.borderTop=&#x27;5px solid var(--&#x27;+(lv===&#x27;ok&#x27;?&#x27;actual&#x27;:lv===&#x27;warn&#x27;?&#x27;amber&#x27;:&#x27;miss&#x27;)+&#x27;)&#x27;;
      $(ids.sub).textContent=K.전망메모+` (월 기성 ${fmt(K.월평균기성)}억)`;
      $(ids.l1).textContent=`현 잔고 (${mm}월)`;
      $(ids.n1).textContent=fmt(base.현재)+&#x27;억&#x27;;
      $(ids.n2).textContent=fmt(연말)+&#x27;억&#x27;;
      $(ids.n3).textContent=fmt(필요)+&#x27;억&#x27;;
      const vars = {수주합:fmt(수주합), 적정:fmt(base.적정), 필요:fmt(필요), 기성:fmt(K.월평균기성), 연말:fmt(연말)};
      if (필요 &lt;= 0) {
        setMsg(ids.msg, &#x27;ok&#x27;, `&lt;strong&gt;[정상]&lt;/strong&gt; ${T(K.전망정상문구||K.전망문구, vars)}`);
        $(ids.b2).className=&#x27;num-box ok&#x27;; $(ids.b3).className=&#x27;num-box ok&#x27;;
      } else {
        setMsg(ids.msg, lv, `&lt;strong&gt;[${lv===&#x27;danger&#x27;?&#x27;센서 경보&#x27;:&#x27;주의&#x27;}]&lt;/strong&gt; ${T(K.전망문구, vars)}`);
        $(ids.b2).className=&#x27;num-box &#x27;+(lv===&#x27;danger&#x27;?&#x27;danger&#x27;:&#x27;warn&#x27;);
        $(ids.b3).className=&#x27;num-box &#x27;+(lv===&#x27;danger&#x27;?&#x27;danger live&#x27;:&#x27;warn&#x27;);
      }
      /* 차트: 실적(1~기준월) + 추정(기준월~12월) */
      const act=[...K.월별잔고, ...Array(12-mm).fill(null)];
      const proj=Array(12).fill(null);
      traj.forEach((v,i)=&gt;{ proj[mm-1+i]=v; });
      lineChart(ids.chart,[
        {data:Array(12).fill(base.적정), color:&#x27;#7e93ab&#x27;, dash:&#x27;5,5&#x27;},
        {data:proj, color:&#x27;#ff6969&#x27;, dash:&#x27;4,4&#x27;, dots:true, vlab:true, below:true, vskip:1},
        {data:act, color:&#x27;#8cb269&#x27;, dots:true, width:3, vlab:true},
      ], base.적정*1.15, M_ALL);
    }
    const bi=renderBal(D.잔고_인프라,{sub:&#x27;bali-sub&#x27;,badge:&#x27;bali-badge&#x27;,pnl:&#x27;pnl-bal-i&#x27;,n1:&#x27;bali-n1&#x27;,n2:&#x27;bali-n2&#x27;,n3:&#x27;bali-n3&#x27;,b4:&#x27;bali-b4&#x27;,l4:&#x27;bali-l4&#x27;,n4:&#x27;bali-n4&#x27;,msg:&#x27;bali-msg&#x27;,lg:&#x27;bali-lg&#x27;,chart:&#x27;svg-bal-infra&#x27;});
    const ba=renderBal(D.잔고_건축,{sub:&#x27;bala-sub&#x27;,badge:&#x27;bala-badge&#x27;,pnl:&#x27;pnl-bal-a&#x27;,n1:&#x27;bala-n1&#x27;,n2:&#x27;bala-n2&#x27;,n3:&#x27;bala-n3&#x27;,b4:&#x27;bala-b4&#x27;,l4:&#x27;bala-l4&#x27;,n4:&#x27;bala-n4&#x27;,msg:&#x27;bala-msg&#x27;,lg:&#x27;bala-lg&#x27;,chart:&#x27;svg-bal-arch&#x27;});
    renderProj(D.잔고_인프라,{badge:&#x27;proji-badge&#x27;,pnl:&#x27;pnl-proj-i&#x27;,sub:&#x27;proji-sub&#x27;,l1:&#x27;proji-l1&#x27;,n1:&#x27;proji-n1&#x27;,n2:&#x27;proji-n2&#x27;,n3:&#x27;proji-n3&#x27;,b2:&#x27;proji-b2&#x27;,b3:&#x27;proji-b3&#x27;,msg:&#x27;proji-msg&#x27;,chart:&#x27;svg-proj-infra&#x27;}, bi);
    renderProj(D.잔고_건축,{badge:&#x27;proja-badge&#x27;,pnl:&#x27;pnl-proj-a&#x27;,sub:&#x27;proja-sub&#x27;,l1:&#x27;proja-l1&#x27;,n1:&#x27;proja-n1&#x27;,n2:&#x27;proja-n2&#x27;,n3:&#x27;proja-n3&#x27;,b2:&#x27;proja-b2&#x27;,b3:&#x27;proja-b3&#x27;,msg:&#x27;proja-msg&#x27;,chart:&#x27;svg-proj-arch&#x27;}, ba);

    /* ── 3.1 분양 (클릭형) ── */
    const F=D.분양;
    // 각 현장 판정: 세부 구분 중 최악(갭 최대)으로 현장 상태 결정
    function segStatus(seg){
      const 분양률 = Math.round(seg.계약/seg.총세대*100);
      if(seg.EXIT==null) return {분양률, lv: 분양률&gt;=100?&#x27;ok&#x27;:(분양률&gt;=70?&#x27;warn&#x27;:&#x27;danger&#x27;), 갭:null};
      const 갭 = seg.EXIT - 분양률;
      let lv = &#x27;변수&#x27;;
      if(갭&lt;=F.주의기준_갭) lv=&#x27;ok&#x27;;
      else if(갭&lt;F.경보기준_갭) lv=&#x27;warn&#x27;;
      else lv=&#x27;danger&#x27;;
      return {분양률, lv, 갭};
    }
    function siteStatus(site){
      let worst=&#x27;ok&#x27;; const rank={ok:0,warn:1,danger:2};
      site.세부.forEach(seg=&gt;{ const s=segStatus(seg); if(rank[s.lv]&gt;rank[worst]) worst=s.lv; });
      return worst;
    }
    const 경보수 = F.현장.filter(s=&gt;siteStatus(s)===&#x27;danger&#x27;).length;
    const 주의수 = F.현장.filter(s=&gt;siteStatus(s)===&#x27;warn&#x27;).length;
    $(&#x27;sale-sub&#x27;).textContent = F.부제||&#x27;&#x27;;
    $(&#x27;sale-note&#x27;).textContent = F.하단주석||&#x27;&#x27;;
    setBadge(&#x27;sale-badge&#x27;, 경보수?&#x27;danger&#x27;:(주의수?&#x27;warn&#x27;:&#x27;ok&#x27;), 경보수?`경보 ${경보수}개`:(주의수?`주의 ${주의수}개`:&#x27;전 현장 정상&#x27;));
    setMsg(&#x27;sale-msg&#x27;, 경보수?&#x27;danger&#x27;:(주의수?&#x27;warn&#x27;:&#x27;ok&#x27;),
      `&lt;strong&gt;[${경보수?&#x27;센서 경보&#x27;:(주의수?&#x27;주의&#x27;:&#x27;정상&#x27;)}]&lt;/strong&gt; 전 ${F.현장.length}개 현장 중 경보 ${경보수} · 주의 ${주의수} — EXIT 목표 미달 갭 30%p 이상은 경보`);

    // 리스트 렌더
    const badgeDot = {ok:&#x27;🟢&#x27;,warn:&#x27;🟡&#x27;,danger:&#x27;🚨&#x27;};
    $(&#x27;sale-list&#x27;).innerHTML = F.현장.map((site,i)=&gt;{
      const lv = siteStatus(site);
      // 대표 분양률: 최악 구분의 분양률
      let worstSeg=site.세부[0], worstRank=-1; const rank={ok:0,warn:1,danger:2};
      site.세부.forEach(seg=&gt;{ const s=segStatus(seg); if(rank[s.lv]&gt;worstRank){worstRank=rank[s.lv];worstSeg=seg;} });
      const 분양률 = Math.round(worstSeg.계약/worstSeg.총세대*100);
      const clsMap={ok:&#x27;green&#x27;,warn:&#x27;amber&#x27;,danger:&#x27;red&#x27;}, stMap={ok:&#x27;done&#x27;,warn:&#x27;warn&#x27;,danger:&#x27;fail&#x27;};
      const 구분표시 = site.세부.length&gt;1 ? ` &lt;span style=&quot;color:var(--sub);font-size:12px;&quot;&gt;(${site.세부.length}개 구분)&lt;/span&gt;` : &#x27;&#x27;;
      return `&lt;div class=&quot;task-item ${stMap[lv]}&quot; style=&quot;cursor:pointer;&quot; onclick=&quot;selectSite(${i})&quot; id=&quot;site-${i}&quot;&gt;
        &lt;div class=&quot;left&quot;&gt;${badgeDot[lv]} ${site.이름}${구분표시}&lt;/div&gt;
        &lt;span class=&quot;amt ${clsMap[lv]}&quot;&gt;${분양률}%&lt;/span&gt;&lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    // 상세 렌더
    window.selectSite = function(i){
      const site = F.현장[i];
      document.querySelectorAll(&#x27;[id^=&quot;site-&quot;]&#x27;).forEach((el,idx)=&gt; el.style.outline = idx===i?&#x27;2px solid var(--amber)&#x27;:&#x27;none&#x27;);
      const lv = siteStatus(site);
      setBadge(&#x27;sd-badge&#x27;, lv, lv===&#x27;ok&#x27;?&#x27;정상&#x27;:lv===&#x27;warn&#x27;?&#x27;주의&#x27;:&#x27;경보&#x27;);
      $(&#x27;pnl-saledetail&#x27;).style.borderTop = &#x27;5px solid var(--&#x27;+(lv===&#x27;ok&#x27;?&#x27;actual&#x27;:lv===&#x27;warn&#x27;?&#x27;amber&#x27;:&#x27;miss&#x27;)+&#x27;)&#x27;;
      $(&#x27;sd-title&#x27;).textContent = site.이름;
      $(&#x27;sd-sub&#x27;).textContent = site.세부.length&gt;1 ? `구분 ${site.세부.length}개 · 도급/PF는 현장 공통` : &#x27;&#x27;;
      // 상단: 총도급 · PF · 총세대
      const 총세대 = site.세부.reduce((a,s)=&gt;a+s.총세대,0);
      const 총계약 = site.세부.reduce((a,s)=&gt;a+s.계약,0);
      $(&#x27;sd-top&#x27;).innerHTML = `
        &lt;div class=&quot;num-box&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;총 도급액&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${site.도급? fmt(site.도급)+&#x27;억&#x27;:&#x27;—&#x27;}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;num-box ${site.PF&gt;0?&#x27;warn&#x27;:&#x27;&#x27;}&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;PF 잔액&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${site.PF&gt;0? fmt(site.PF)+&#x27;억&#x27;:&#x27;없음&#x27;}&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;num-box&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;전체 분양률&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${Math.round(총계약/총세대*100)}% &lt;small&gt;${총계약}/${총세대}&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;`;
      // 구분별 섹션 (세대 정보 + 도넛)
      $(&#x27;sd-sections&#x27;).innerHTML = site.세부.map((seg,si)=&gt;{
        const s = segStatus(seg);
        const 잔여 = seg.총세대 - seg.계약;
        const exitTxt = seg.EXIT표시 || (seg.EXIT!=null ? seg.EXIT+&#x27;%&#x27; : &#x27;—&#x27;);
        const 갭Txt = s.갭!=null ? (s.갭&lt;=0?&#x27;목표 달성/초과&#x27;:`목표 대비 -${s.갭}%p`) : &#x27;전세(EXIT 없음)&#x27;;
        const donutId = `sd-donut-${i}-${si}`;
        return `&lt;div class=&quot;tracker-box&quot;&gt;
          &lt;div class=&quot;tracker-title&quot;&gt;${badgeDot[s.lv]} ${seg.구분} — 분양률 ${s.분양률}% / EXIT ${exitTxt} · ${갭Txt}&lt;/div&gt;
          &lt;div style=&quot;display:flex; gap:16px; align-items:center; flex-wrap:wrap;&quot;&gt;
            &lt;div style=&quot;flex:1; min-width:180px;&quot;&gt;
              &lt;div class=&quot;num-dashboard c3&quot; style=&quot;margin-bottom:0;&quot;&gt;
                &lt;div class=&quot;num-box&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;총세대&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${seg.총세대}&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;num-box ok&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;계약&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${seg.계약}&lt;/div&gt;&lt;/div&gt;
                &lt;div class=&quot;num-box ${잔여&gt;0?&#x27;warn&#x27;:&#x27;&#x27;}&quot;&gt;&lt;div class=&quot;num-lbl&quot;&gt;잔여&lt;/div&gt;&lt;div class=&quot;num-val&quot;&gt;${잔여}&lt;/div&gt;&lt;/div&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div style=&quot;width:150px; height:150px;&quot; id=&quot;${donutId}&quot;&gt;&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;`;
      }).join(&#x27;&#x27;);
      // 도넛 그리기
      site.세부.forEach((seg,si)=&gt;{
        const 잔여 = seg.총세대 - seg.계약;
        saleDonut(`sd-donut-${i}-${si}`, seg.계약, 잔여);
      });
    };
    // 세대 도넛 (계약 vs 잔여)
    function saleDonut(id, done, rest){
      const el=$(id); if(!el) return;
      const total=done+rest, R=58, r=34, cx=75, cy=75;
      const frac = total? done/total : 0;
      const a0=-Math.PI/2, a1=a0+frac*2*Math.PI;
      const large=frac&gt;0.5?1:0;
      function arc(s,e,rad){ return `${cx+rad*Math.cos(s)} ${cy+rad*Math.sin(s)} A ${rad} ${rad} 0 ${(e-s)&gt;Math.PI?1:0} 1 ${cx+rad*Math.cos(e)} ${cy+rad*Math.sin(e)}`; }
      let seg=&#x27;&#x27;;
      if(frac&gt;0 &amp;&amp; frac&lt;1){
        seg = `&lt;path d=&quot;M ${cx+R*Math.cos(a0)} ${cy+R*Math.sin(a0)} A ${R} ${R} 0 ${large} 1 ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)} L ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} A ${r} ${r} 0 ${large} 0 ${cx+r*Math.cos(a0)} ${cy+r*Math.sin(a0)} Z&quot; fill=&quot;#8cb269&quot; opacity=&quot;0.92&quot;/&gt;`;
        seg += `&lt;path d=&quot;M ${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)} A ${R} ${R} 0 ${large?0:1} 1 ${cx+R*Math.cos(a0+2*Math.PI)} ${cy+R*Math.sin(a0+2*Math.PI)} L ${cx+r*Math.cos(a0+2*Math.PI)} ${cy+r*Math.sin(a0+2*Math.PI)} A ${r} ${r} 0 ${large?0:1} 0 ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)} Z&quot; fill=&quot;#ff6969&quot; opacity=&quot;0.55&quot;/&gt;`;
      } else {
        const c = frac&gt;=1 ? &#x27;#8cb269&#x27; : &#x27;#ff6969&#x27;;
        seg = `&lt;circle cx=&quot;${cx}&quot; cy=&quot;${cy}&quot; r=&quot;${(R+r)/2}&quot; fill=&quot;none&quot; stroke=&quot;${c}&quot; stroke-width=&quot;${R-r}&quot; opacity=&quot;0.85&quot;/&gt;`;
      }
      el.innerHTML = `&lt;svg viewBox=&quot;0 0 150 150&quot; width=&quot;100%&quot; height=&quot;100%&quot;&gt;${seg}
        &lt;text x=&quot;${cx}&quot; y=&quot;${cy-4}&quot; fill=&quot;#eef5ff&quot; font-size=&quot;19&quot; font-weight=&quot;800&quot; text-anchor=&quot;middle&quot;&gt;${Math.round(frac*100)}%&lt;/text&gt;
        &lt;text x=&quot;${cx}&quot; y=&quot;${cy+14}&quot; fill=&quot;#8fa4bd&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;계약 ${done}&lt;/text&gt;&lt;/svg&gt;`;
    }
    // 최초 진입 시 첫 경보 현장(없으면 0번) 자동 선택
    (function(){
      let idx = F.현장.findIndex(s=&gt;siteStatus(s)===&#x27;danger&#x27;);
      if(idx&lt;0) idx=0;
      selectSite(idx);
    })();

    /* ── 3.2 PF ── */
    const PF=D.PF;
    const 위험건=PF.목록.filter(x=&gt;x.상태!==&#x27;done&#x27;).length;
    setBadge(&#x27;pf-badge&#x27;,&#x27;warn&#x27;,`6개월 내 ${위험건}건`);
    $(&#x27;pf-sub&#x27;).textContent=PF.부제||&#x27;&#x27;;
    $(&#x27;pf-list&#x27;).innerHTML=PF.목록.map(x=&gt;taskItem(x.상태,x.이름,fmt(x.금액)+&#x27;억&#x27;,x.상태===&#x27;fail&#x27;?&#x27;red&#x27;:x.상태===&#x27;warn&#x27;?&#x27;amber&#x27;:x.상태===&#x27;done&#x27;?&#x27;green&#x27;:&#x27;&#x27;)).join(&#x27;&#x27;);
    $(&#x27;pf-msg&#x27;).innerHTML=`&lt;strong&gt;[주의]&lt;/strong&gt; ${PF.상태문구}`;
    barChart(&#x27;svg-pf&#x27;, PF.분기만기_금액, PF.분기만기_라벨, &#x27;#ffad42&#x27;);

    const C=D.차입, 현의존=C.월별의존도[C.월별의존도.length-1];
    setBadge(&#x27;debt-badge&#x27;, C.전이시_의존도&gt;=C.경보선?&#x27;danger&#x27;:&#x27;danger&#x27;, `스트레스 ${C.전이시_의존도}%`);
    $(&#x27;debt-n1&#x27;).textContent=현의존+&#x27;%&#x27;;
    $(&#x27;debt-n2&#x27;).textContent=fmt(C.위험보증액)+&#x27;억&#x27;;
    $(&#x27;debt-n3&#x27;).textContent=C.전이시_의존도+&#x27;%&#x27;;
    $(&#x27;debt-l4&#x27;).textContent=`경보선(${C.경보선}%)까지`;
    $(&#x27;debt-n4&#x27;).textContent=(C.경보선-C.전이시_의존도)+&#x27;%p&#x27;;
    $(&#x27;debt-sub&#x27;).textContent=C.부제||&#x27;&#x27;;
    $(&#x27;debt-msg&#x27;).innerHTML=`&lt;strong&gt;[스트레스 결과]&lt;/strong&gt; `+T(C.문구,{현재:현의존,전이:C.전이시_의존도,목표:C.목표선,경보:C.경보선});
    $(&#x27;debt-link&#x27;).textContent=C.연계문구||&#x27;&#x27;;
    $(&#x27;debt-lg&#x27;).textContent=`╌╌ 경보선(${C.경보선}%)`;
    const dn=C.월별의존도.length, total=dn+C.스트레스경로.length;
    const dLabels=[...M_ALL.slice(0,dn), ...C.스트레스경로.map((_,i)=&gt;&#x27;전이T+&#x27;+(i+1))];
    const dAct=[...C.월별의존도, ...Array(C.스트레스경로.length).fill(null)];
    const dStr=Array(total).fill(null); dStr[dn-1]=현의존; C.스트레스경로.forEach((v,i)=&gt;dStr[dn+i]=v);
    lineChart(&#x27;svg-debt&#x27;,[
      {data:Array(total).fill(C.경보선), color:&#x27;#7e93ab&#x27;, dash:&#x27;5,5&#x27;},
      {data:dAct, color:&#x27;#8cb269&#x27;, dots:true, width:3, vlab:true, lab:dAct.map(v=&gt;v===null?&#x27;&#x27;:v+&#x27;%&#x27;)},
      {data:dStr, color:&#x27;#ff6969&#x27;, dash:&#x27;4,4&#x27;, dots:true, vlab:true, below:true, vskip:1, lab:dStr.map(v=&gt;v===null?&#x27;&#x27;:v+&#x27;%&#x27;)},
    ], C.경보선*1.2, dLabels);

    /* ── 대분류 상태 자동 집계 ── */
    setCatStatus(&#x27;cst-1&#x27;, spiLv===&#x27;danger&#x27;||B.상태===&#x27;danger&#x27;?&#x27;danger&#x27;:&#x27;warn&#x27;, spiLv!==&#x27;ok&#x27;||P.상태!==&#x27;ok&#x27;?&#x27;주의&#x27;:&#x27;정상&#x27;);
    const balDanger = (bi.적정-bi.현재&gt;0)||(ba.적정-ba.현재&gt;0);
    setCatStatus(&#x27;cst-2&#x27;, balDanger?&#x27;danger&#x27;:&#x27;ok&#x27;, balDanger?&#x27;경보 1&#x27;:&#x27;정상&#x27;);
    // 3.1 분양: 경보 현장 수로 대분류3 상태 집계 (siteStatus 재사용)
    (function(){
      const rank={ok:0,warn:1,danger:2};
      function segLv(seg){
        const 분양률=Math.round(seg.계약/seg.총세대*100);
        if(seg.EXIT==null) return 분양률&gt;=100?&#x27;ok&#x27;:(분양률&gt;=70?&#x27;warn&#x27;:&#x27;danger&#x27;);
        const 갭=seg.EXIT-분양률;
        return 갭&lt;=D.분양.주의기준_갭?&#x27;ok&#x27;:(갭&lt;D.분양.경보기준_갭?&#x27;warn&#x27;:&#x27;danger&#x27;);
      }
      let 경보=0, 주의=0;
      D.분양.현장.forEach(site=&gt;{
        let w=&#x27;ok&#x27;; site.세부.forEach(seg=&gt;{ const l=segLv(seg); if(rank[l]&gt;rank[w])w=l; });
        if(w===&#x27;danger&#x27;)경보++; else if(w===&#x27;warn&#x27;)주의++;
      });
      setCatStatus(&#x27;cst-3&#x27;, 경보?&#x27;danger&#x27;:(주의?&#x27;warn&#x27;:&#x27;ok&#x27;), 경보?(&#x27;경보 &#x27;+경보):(주의?(&#x27;주의 &#x27;+주의):&#x27;정상&#x27;));
    })();
  }

  // DATA 로드 보장 후 렌더 (외부 data.js 로딩 타이밍 방어)
  function initDashboard(){
    if(typeof DATA===&#x27;undefined&#x27;){ setTimeout(initDashboard, 50); return; }
    render();
    selectCat(1);
  }
  if(document.readyState===&#x27;loading&#x27;){
    document.addEventListener(&#x27;DOMContentLoaded&#x27;, initDashboard);
  } else {
    initDashboard();
  }
&lt;/script&gt;

<script>
/* ═══════════════════════════════════════════════════════════════
   02 공정 — 선행지표 대시보드 데이터
   ▶ 매월/수시 이 파일의 숫자·문장만 수정 → 저장 → F5
   ◆ 따옴표 안 내용만 수정.  상태: ok(초록)/warn(노랑)/danger(빨강)
   ◆ 리스트 상태: done(초록)/warn(노랑)/fail(빨강)
   ─────────────────────────────────────────────
   구조: 대분류 3개 × 중분류 2개 = 6화면. 각 화면은 카드 1~2개.
   카드 종류(type): metrics(숫자박스+메시지+차트) / list(리스트) 조합 자유
═══════════════════════════════════════════════════════════════ */

const GONGJEONG = {
  meta: {
    제목: "02 공정 — 선행지표 대시보드",
    부제: "마일스톤·안전·품질 단계의 공정 리스크 조기 감지 (수치는 예시)",
    기준: "2026년 6월 마감 기준",
  },

  대분류: [
    { name:"공정·공기 관리", desc:"마일스톤 준수 → 공기지연·돌관 리스크 조기 감지", status:{lv:"warn",txt:"주의 1"} },
    { name:"안전관리",      desc:"아차사고(선행) → 중대재해(후행) 전이 차단", status:{lv:"danger",txt:"경보 1"} },
    { name:"하도급 리스크 관리", desc:"하도급 수행 리스크·협력업체 재무위험 비율 모니터링", status:{lv:"danger",txt:"경보 1"} },
  ],

  중분류: {
    "1": [
      { id:"1-1", name:"1.1 공정준수" },
      { id:"1-2", name:"1.2 준공리스크" },
    ],
    "2": [
      { id:"2-1", name:"2.1 재해예방" },
      { id:"2-2", name:"2.2 재해실적" },
    ],
    "3": [
      { id:"3-1", name:"3.1 하도급 수행 리스크 발생률" },
      { id:"3-2", name:"3.2 협력업체 재무위험 비율" },
    ],
  },

  /* ══════════ 각 중분류 화면 정의 ══════════ */
  화면: {

    /* ── 1.1 공정준수 ── */
    "1-1": [
      { type:"metrics", accent:"amber", title:"공정 진행 준수율", sub:"계획 공정 대비 실적 | 전 현장 가중평균", badge:{lv:"warn",txt:"주의"},
        boxes:[

          {st:"fail", name:"중대재해 관련 영업정지 심의 (진행 중)", amt:"리스크", cls:"red"},
          {st:"warn", name:"○○현장 부실시공 과징금 (이의신청)", amt:"협의중", cls:"amber"},
          {st:"warn", name:"하도급법 위반 경고 (개선 완료)", amt:"경고", cls:"amber"},
          {st:"done", name:"환경규제 점검 (적합 판정)", amt:"적합", cls:"green"},
        ],
        note:"* 입찰제한 확정 시 관급 수주 직접 타격 — 01 수주 대분류로 리스크 전이",
      },
    ],

  },
};

</script>
<script>
  const $ = id => document.getElementById(id);
  const BADGE = { ok:['st-ok','🟢'], warn:['st-warn','🟡'], danger:['st-danger','🚨'] };

  /* ── 최상위 5대분류 탭 ── */
  function worstDot(D){
    if(!D||!D.대분류) return "ok";
    const rank={ok:0,warn:1,danger:2}; let w="ok";
    D.대분류.forEach(c=>{ if(rank[c.status.lv]>rank[w]) w=c.status.lv; });
    return w;
  }
  const MAIN = [
    {no:"01", name:"수주", dot:"danger"},
    {no:"02", name:"공정", dot:worstDot(typeof GONGJEONG!=='undefined'?GONGJEONG:null)},
    {no:"03", name:"자금", dot:worstDot(typeof JAGEUM!=='undefined'?JAGEUM:null)},
    {no:"04", name:"이익", dot:worstDot(typeof IIK!=='undefined'?IIK:null)},
    {no:"05", name:"운영", dot:worstDot(typeof UNYEONG!=='undefined'?UNYEONG:null)},
  ];

  function buildMainTabs(){
    $('maintabs').innerHTML = MAIN.map((m,i)=>
      `<div class="maintab${i===0?' active':''}" id="mt-${i+1}" onclick="selectMain(${i+1})">
        <span class="mt-dot dot-${m.dot}"></span>
        <div class="mt-no">${m.no}</div><div class="mt-name">${m.name}</div>
      </div>`).join('');
  }

  function selectMain(n){
    document.querySelectorAll('.maintab').forEach((el,i)=>el.classList.toggle('active',i===n-1));
    document.querySelectorAll('.dv').forEach(el=>el.classList.remove('on'));
    const target = $('stage-'+n);
    if(target) target.classList.add('on');
    if(n===1) setTimeout(fitIframe, 50);
  }

  /* ══════════ 차트 엔진 ══════════ */
  function lineChart(el, series, maxY, labels, cardChart) {
    const minY = (cardChart && cardChart.minY !== undefined) ? cardChart.minY : 0;
    const rangeY = (maxY - minY) || 1;
    const w=600, h=215, padX=30, padY=22, dw=w-padX*2, dh=h-padY*2, n=labels.length;
    const xs=i=>padX+i*(dw/(n-1)), ys=v=>padY+dh-((v-minY)/rangeY)*dh;
    let grid='', lbl='';
    labels.forEach((m,i)=>{
      grid+=`<line x1="${xs(i)}" y1="${padY}" x2="${xs(i)}" y2="${padY+dh}" stroke="#16322f" stroke-width="1"/>`;
      lbl+=`<text x="${xs(i)}" y="${h-3}" fill="#8fa4bd" font-size="10.5" text-anchor="middle">${m}</text>`;
    });
    let paths='', dots='', vt='';
    series.forEach(s=>{
      let d='', seen=0;
      s.data.forEach((v,i)=>{
        if(v===null||v===undefined) return;
        d+=(d?' L':'M')+` ${xs(i)} ${ys(v)}`;
        if(s.dots) dots+=`<circle cx="${xs(i)}" cy="${ys(v)}" r="3.5" fill="${s.color}" stroke="#0d1f1d" stroke-width="2"/>`;
        if(s.vlab){
          seen++;
          if(!(s.vskip && seen<=s.vskip)){
            const txt = s.lab ? s.lab[i] : v;
            vt+=`<text x="${xs(i)}" y="${s.below?ys(v)+17:ys(v)-9}" fill="${s.color}" font-size="9.5" font-weight="700" text-anchor="middle">${txt}</text>`;
          }
        }
      });
      paths+=`<path d="${d}" stroke="${s.color}" stroke-width="${s.width||2.5}" fill="none" stroke-dasharray="${s.dash||''}" stroke-linecap="round" stroke-linejoin="round"/>`;
    });
    el.innerHTML=`<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none">${grid}${paths}${dots}${vt}${lbl}</svg>`;
  }

  function barChart(el, data, labels, color) {
    const maxY=Math.max(...data)*1.25, w=600, h=215, padX=30, padY=18, dw=w-padX*2, dh=h-padY*2, bw=dw/data.length*0.55;
    let bars='', lbl='';
    data.forEach((v,i)=>{
      const x=padX+i*(dw/data.length)+(dw/data.length-bw)/2, bh=(v/maxY)*dh;
      bars+=`<rect x="${x}" y="${padY+dh-bh}" width="${bw}" height="${bh}" rx="4" fill="${color}" opacity="0.85"/>`;
      bars+=`<text x="${x+bw/2}" y="${padY+dh-bh-6}" fill="${color}" font-size="10" font-weight="700" text-anchor="middle">${v}</text>`;
      lbl+=`<text x="${x+bw/2}" y="${h-2}" fill="#8fa4bd" font-size="10" text-anchor="middle">${labels[i]}</text>`;
    });
    el.innerHTML=`<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="none">${bars}${lbl}</svg>`;
  }

  /* ══════════ 카드 렌더링 헬퍼 ══════════ */
  function badgeHtml(b){ return `<div class="badge ${BADGE[b.lv][0]}">${BADGE[b.lv][1]} ${b.txt}</div>`; }
  
  function taskItem(it){
    const icon = it.st==='done'?'<span class="icon-done">✔</span>':it.st==='warn'?'<span class="icon-warn">●</span>':'<span class="icon-fail">⚠</span>';
    const nm = it.st==='fail'?`<strong style="color:#ffb3ad">${it.name}</strong>`:it.name;
    return `<div class="task-item ${it.st}"><div class="left">${icon} ${nm}</div>${it.amt?`<span class="amt ${it.cls||''}">${it.amt}</span>`:''}</div>`;
  }

  function cardHtml(card, cid){
    const accent = card.accent||'amber';
    let inner = `<div class="panel-head"><div><div class="p-title">${card.title}</div><div class="p-sub">${card.sub||''}</div></div>`;
    if(card.hasOutTab) {
      inner += `<div style="display:flex;gap:6px;align-items:center;">
        <button class="scn-btn active" style="padding:4px 12px;font-size:13px;cursor:pointer;">자재 (디폴트)</button>
        <button class="scn-btn" style="padding:4px 12px;font-size:13px;opacity:0.4;cursor:not-allowed;" title="외주 데이터 준비 중">외주</button>
        ${card.badge?badgeHtml(card.badge):''}
      </div></div>`;
    } else {
      inner += `${card.badge?badgeHtml(card.badge):''}</div>`;
    }

    if(card.boxes){
      const c3Cls = card.boxes.length===3 ? 'c3' : '';
      inner += `<div class="num-dashboard ${c3Cls}">`+card.boxes.map((b, bi)=>`
        <div class="num-box ${b.cls||''}">
          <div class="num-lbl" id="${card.type==='metrics_c21' && bi<3 ? 'm21-lbl'+(bi+1) : ''}">${b.lbl}</div>
          <div class="num-val ${b.cls||''}" id="${card.type==='metrics_c21' && bi<3 ? 'm21-val'+(bi+1) : ''}">${b.val}</div>
        </div>
      `).join('')+`</div>`;
    }

    if(card.msg){ inner += `<div class="warning-msg ${card.msg.lv==='ok'?'safe':card.msg.lv}">${card.msg.txt}</div>`; }

    if(card.items){
      inner += `<div class="tracker-box">${card.listTitle?`<div class="tracker-title">${card.listTitle}</div>`:''}<div class="task-list">${card.items.map(taskItem).join('')}</div></div>`;
    }

    if(card.type === 'metrics_c21') {
      inner += `<div class="chart-container" style="display:flex;flex-direction:column;gap:10px;flex-grow:1;min-height:300px;">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 12px;background:var(--deep);border-radius:8px;border:1px solid var(--border);">
          <span style="font-size:12.5px;font-weight:700;color:var(--sub);margin-right:4px;">품목 선택:</span>
          ${MAT_DATA.items.map(m => `
            <button class="scn-btn ${activeMats[m.id]?'active':''}" id="mat-btn-${m.id}" onclick="toggleMat('${m.id}')" style="padding:4px 10px;font-size:12px;">
              ${m.shape} ${m.name}
            </button>
          `).join('')}
        </div>
        <div class="svg-canvas" id="${cid}" style="min-height:280px;width:100%;">${getChart21SvgHtml()}</div>
      </div>`;
    }

    if(card.type === 'bd_table') {
      inner += `<div class="tracker-box">
        <div class="tracker-title">주요 자재/하도급 입찰계약 절감 현황 (공급가 1.0억원 이상)</div>
        <div id="bd-list-box">${getBDListHtml()}</div>
      </div>`;
    }

    if(card.chart){
      const lg = (card.chart.legend||[]).map(l=>`<span style="color:${l.c};">${l.t}</span>`).join('');
      inner += `<div class="chart-container"><div class="custom-legend">${lg}</div><div class="svg-canvas" id="${cid}"></div></div>`;
    }

    if(card.note){ inner += `<div class="note">${card.note}</div>`; }

    return `<div class="card ${accent} flex-col">${inner}</div>`;
  }

  /* ══════════ 대분류/중분류 렌더 ══════════ */
  function renderGeneric(mountId, D){
    const root = $(mountId);
    if(!root) return;
    let html = `<div class="sub-head"><div class="sub-h-title">${D.meta.부제}</div><div class="sub-h-title">${D.meta.기준}</div></div>`;
    html += `<div class="sub-tabs" id="${mountId}-subtabs"></div><div class="content" id="${mountId}-content"></div>`;
    root.innerHTML = html;

    const catbar = document.createElement('div');
    catbar.style.cssText='display:flex;gap:12px;padding:18px 36px 0;';
    D.대분류.forEach((c,ci)=>{
      const el=document.createElement('div');
      el.style.cssText='flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;cursor:pointer;position:relative;transition:all .16s;';
      el.innerHTML=`<div style="font-size:12px;color:var(--sub);font-weight:700;">대분류 ${ci+1}</div>
        <div style="font-size:19px;font-weight:800;margin-top:3px;">${c.name}</div>
        <div style="font-size:12px;color:var(--sub);margin-top:5px;">${c.desc}</div>
        <div class="badge ${BADGE[c.status.lv][0]}" style="position:absolute;top:14px;right:16px;font-size:11px;padding:4px 9px;">${c.status.txt}</div>`;
      el.onmouseover=()=>el.style.borderColor='var(--amber)';
      el.onmouseout=()=>{ if(!el.dataset.active) el.style.borderColor='var(--border)'; };
      el.onclick=()=>selectGCat(mountId, D, ci+1);
      el.id=`${mountId}-cat-${ci+1}`;
      catbar.appendChild(el);
    });
    root.insertBefore(catbar, root.children[1] || null);

    root._data = D;
    selectGCat(mountId, D, 1);
  }

  function selectGCat(mountId, D, ci){
    D.대분류.forEach((_,i)=>{
      const el=$(`${mountId}-cat-${i+1}`);
      if(!el) return;
      const on = (i===ci-1);
      el.dataset.active = on?'1':'';
      el.style.borderColor = on?'var(--amber)':'var(--border)';
      el.style.background = on?'linear-gradient(180deg, rgba(255,173,66,0.10), rgba(255,173,66,0.02))':'var(--card)';
    });
    const subs = D.중분류[String(ci)]||[];
    const box = $(`${mountId}-subtabs`);
    if(box){
      box.innerHTML='';
      subs.forEach((s,i)=>{
        const b=document.createElement('div');
        b.className='sub-tab';
        b.textContent=s.name;
        b.id=`${mountId}-tab-${s.id}`;
        b.onclick=()=>selectGScreen(mountId, D, s.id);
        box.appendChild(b);
      });
    }
    if(subs.length>0) selectGScreen(mountId, D, subs[0].id);
  }

  /* ══════════ 2.1 자재 단가 변동률 데이터 & 차트 ══════════ */
  const MAT_DATA = {
    labels: ["20년(기준)","21년","22년","23년","24년","25년","26년(현재)"],
    items: [
      { id:"total", name:"종합 인덱스", shape:"●", color:"#ff4d4d", dash:"", line:[100,118.5,138.2,146.4,152.0,156.8,162.5], cum:"+62.5%", yr:"+7.2%", defaultOn:true },
      { id:"cable", name:"케이블", shape:"▲", color:"#ffaa00", dash:"5,5", line:[100,133.6,181.5,176.2,203.6,238.7,315.1], cum:"+215.1%", yr:"+32.0%", defaultOn:true },
      { id:"cement", name:"시멘트", shape:"■", color:"#38bdf8", dash:"5,5", line:[100,122.0,137.3,161.0,161.0,161.0,176.3], cum:"+76.3%", yr:"+9.5%", defaultOn:true },
      { id:"remital", name:"레미탈", shape:"◆", color:"#4ade80", dash:"3,3", line:[100,103.6,130.4,160.7,160.7,162.5,153.6], cum:"+53.6%", yr:"-5.5%", defaultOn:true },
      { id:"gypsum", name:"석고보드", shape:"★", color:"#c084fc", dash:"3,3", line:[100,100.0,132.8,141.3,141.3,141.3,148.9], cum:"+48.9%", yr:"+5.4%", defaultOn:true },
      { id:"pipe", name:"강관류", shape:"⬡", color:"#facc15", dash:"3,3", line:[100,109.0,158.6,142.8,121.4,115.3,99.1], cum:"-0.9%", yr:"+7.8%", defaultOn:true },
      { id:"conduit", name:"강제전선관", shape:"+", color:"#22d3ee", dash:"3,3", line:[100,109.0,158.7,142.9,131.4,115.4,121.0], cum:"+21.0%", yr:"+4.8%", defaultOn:true },
    ]
  };

  let activeMats = {};
  MAT_DATA.items.forEach(m => { activeMats[m.id] = m.defaultOn; });

  let lastC21Cid = null;
  let currMaxVal21 = 330;

  function toggleMat(id) {
    activeMats[id] = !activeMats[id];
    const btn = $(`mat-btn-${id}`);
    const m = MAT_DATA.items.find(x => x.id === id);
    if(btn && m){
      btn.classList.toggle('active', activeMats[id]);
    }

    const lbl1 = $(`m21-lbl1`);
    const val1 = $(`m21-val1`);
    const lbl2 = $(`m21-lbl2`);
    const val2 = $(`m21-val2`);
    const val3 = $(`m21-val3`);

    if(activeMats[id] && id !== 'total'){
      if(lbl1) lbl1.textContent = `${m.name} 2020년 대비 상승률`;
      if(val1) val1.textContent = m.cum;
      if(lbl2) lbl2.textContent = `${m.name} 전년 대비 상승률`;
      if(val2) val2.textContent = m.yr;
    } else {
      if(lbl1) lbl1.textContent = `2020년 대비 누적 상승률`;
      if(val1) val1.textContent = `+62.5%`;
      if(lbl2) lbl2.textContent = `전년 대비 상승률`;
      if(val2) val2.textContent = `+7.2%`;
    }

    // Dynamic 손익 영향액 (추정) sign logic
    const activeList = MAT_DATA.items.filter(item => activeMats[item.id] && item.id !== 'total');
    let totalImpact = 0;
    if(activeList.length === 0 || MAT_DATA.items.filter(item => activeMats[item.id]).length === MAT_DATA.items.length) {
      totalImpact = -176;
    } else {
      activeList.forEach(item => {
        const cumNum = parseFloat(item.cum.replace('%',''));
        if(!isNaN(cumNum)) {
          totalImpact -= Math.round(cumNum * 0.8 * 10) / 10;
        }
      });
    }

    if(val3) {
      const signFmt = totalImpact > 0 ? `+${totalImpact.toFixed(1)}억원` : (totalImpact < 0 ? `${totalImpact.toFixed(1)}억원` : `0.0억원`);
      val3.textContent = signFmt;
      val3.className = `num-val ${totalImpact < 0 ? 'danger' : 'ok'}`;
    }

    drawChart21(lastC21Cid);
  }

  function getChart21SvgHtml(w=580, h=280) {
    const padL = 35, padR = 25, padT = 20, padB = 25;
    const chartW = w - padL - padR;
    const chartH = h - padT - padB;

    const activeList = MAT_DATA.items.filter(m => activeMats[m.id]);
    let targetMax = 180;

    if(activeList.length > 0) {
      let maxDataVal = 0;
      activeList.forEach(m => {
        const itemMax = Math.max(...m.line);
        if(itemMax > maxDataVal) maxDataVal = itemMax;
      });
      if(maxDataVal > 190) {
        targetMax = 330;
      } else {
        targetMax = 190;
      }
    }

    const maxVal = targetMax;
    const minVal = 80;

    const xStep = chartW / (MAT_DATA.labels.length - 1);
    const getY = (val) => padT + chartH - ((val - minVal) / (maxVal - minVal)) * chartH;

    let svg = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="overflow:visible;">`;

    const gridSteps = maxVal > 200 ? [100, 150, 200, 250, 300] : [100, 120, 140, 160, 180];
    gridSteps.forEach(v => {
      const y = getY(v);
      svg += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,0.08)" stroke-dasharray="3,3" style="transition: all 0.4s ease-in-out;" />`;
      svg += `<text x="${padL-8}" y="${y+4}" fill="var(--sub)" font-size="10" text-anchor="end" style="transition: all 0.4s ease-in-out;">${v}</text>`;
    });

    // X Labels
    MAT_DATA.labels.forEach((lbl, i) => {
      const x = padL + i * xStep;
      svg += `<text x="${x}" y="${h-4}" fill="var(--sub)" font-size="11" text-anchor="middle">${lbl}</text>`;
    });

    // Draw active lines & markers
    activeList.forEach(m => {
      let d = '';
      m.line.forEach((v, i) => {
        const x = padL + i * xStep;
        const y = getY(v);
        d += (d ? ' L' : 'M') + ` ${x} ${y}`;
      });
      svg += `<path d="${d}" fill="none" stroke="${m.color}" stroke-width="${m.id==='total'?3.5:2.5}" stroke-dasharray="${m.dash||''}" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.4s ease-in-out;" />`;

      m.line.forEach((v, i) => {
        const x = padL + i * xStep;
        const y = getY(v);
        if(m.shape === '●') {
          svg += `<circle cx="${x}" cy="${y}" r="${m.id==='total'?5:4}" fill="${m.color}" stroke="var(--card)" stroke-width="1.5" style="transition: all 0.4s ease-in-out;" />`;
        } else if(m.shape === '▲') {
          svg += `<polygon points="${x},${y-5} ${x-4},${y+4} ${x+4},${y+4}" fill="${m.color}" style="transition: all 0.4s ease-in-out;" />`;
        } else if(m.shape === '■') {
          svg += `<rect x="${x-4}" y="${y-4}" width="8" height="8" fill="${m.color}" style="transition: all 0.4s ease-in-out;" />`;
        } else if(m.shape === '◆') {
          svg += `<polygon points="${x},${y-5} ${x+4},${y} ${x},${y+5} ${x-4},${y}" fill="${m.color}" style="transition: all 0.4s ease-in-out;" />`;
        } else if(m.shape === '★') {
          svg += `<text x="${x}" y="${y+4}" fill="${m.color}" font-size="12" text-anchor="middle" style="transition: all 0.4s ease-in-out;">★</text>`;
        } else if(m.shape === '⬡') {
          svg += `<circle cx="${x}" cy="${y}" r="4" fill="none" stroke="${m.color}" stroke-width="2" style="transition: all 0.4s ease-in-out;" />`;
        } else {
          svg += `<text x="${x}" y="${y+4}" fill="${m.color}" font-size="13" font-weight="900" text-anchor="middle" style="transition: all 0.4s ease-in-out;">+</text>`;
        }
      });
    });

    svg += `</svg>`;
    return svg;
  }

  function drawChart21(cid) {
    if(cid) lastC21Cid = cid;
    const targetId = cid || lastC21Cid || 'c21-svg-box';
    let box = $(targetId);
    if(!box) box = $('c21-svg-box');
    if(!box) return;

    const w = box.clientWidth || 580;
    box.innerHTML = getChart21SvgHtml(w, 280);
  }

  const RAW_BD_ALL = [
    { cat:"시험구기", site:"여주 무신사 물류센터", budget:0.1, bid:0.1, sav:0.0, rate:9.3, vendor:"현대정밀산업(주)" },
    { cat:"폼관", site:"평택 주기장 및 유도로", budget:2.0, bid:1.7, sav:0.4, rate:18.3, vendor:"원기업(주)" },
    { cat:"인조화강석블럭", site:"다이소 세종 온라인", budget:0.2, bid:0.2, sav:0.0, rate:20.8, vendor:"(주)팔팔콘크리트" },

  let bdSortMode = 'sav'; // 'sav' | 'rate'
  let bdSortOrder = 'desc'; // 'desc' | 'asc'

  function setBDSortMode(mode) {
    if(bdSortMode === mode) {
      bdSortOrder = (bdSortOrder === 'desc' ? 'asc' : 'desc');
    } else {
      bdSortMode = mode;
      bdSortOrder = 'desc';
    }
    renderBDList();
  }

  function getBDListHtml() {
    let list = [...RAW_BD_ALL].filter(c => c.budget >= 1.0);
    if(bdSortMode === 'sav') {
      list.sort((a,b) => bdSortOrder === 'desc' ? b.sav - a.sav : a.sav - b.sav);
    } else {
      list.sort((a,b) => bdSortOrder === 'desc' ? b.rate - a.rate : a.rate - b.rate);
    }
    let sorted = list.slice(0, 10);

    const savArrow = bdSortMode === 'sav' ? (bdSortOrder === 'desc' ? '▼' : '▲') : '⇅';
    const rateArrow = bdSortMode === 'rate' ? (bdSortOrder === 'desc' ? '▼' : '▲') : '⇅';

    return '<table style="width:100%;border-collapse:collapse;font-size:13px;text-align:left;">' +
      '<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border);color:var(--sub);">' +
      '<th style="padding:8px 10px;">품목</th>' +
      '<th style="padding:8px 10px;">공사현장</th>' +
      '<th style="padding:8px 10px;text-align:right;">예산금액</th>' +
      '<th style="padding:8px 10px;text-align:right;">품의금액</th>' +
      '<th style="padding:8px 10px;text-align:right;">' +
        '<button onclick="setBDSortMode(\'sav\')" class="scn-btn ' + (bdSortMode==='sav'?'active':'') + '" style="padding:2px 8px;font-size:12px;margin:0;">' +
          '절감액 ' + savArrow +
        '</button>' +
      '</th>' +
      '<th style="padding:8px 10px;text-align:right;">' +
        '<button onclick="setBDSortMode(\'rate\')" class="scn-btn ' + (bdSortMode==='rate'?'active':'') + '" style="padding:2px 8px;font-size:12px;margin:0;">' +
          '절감율 ' + rateArrow +
        '</button>' +
      '</th>' +
      '<th style="padding:8px 10px;">계약 업체명</th>' +
      '</tr></thead><tbody>' +
      sorted.map(c =>
        '<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">' +
        '<td style="padding:8px 10px;font-weight:700;color:var(--text);">' + c.cat + '</td>' +
        '<td style="padding:8px 10px;color:var(--sub);">' + c.site + '</td>' +
        '<td style="padding:8px 10px;text-align:right;">' + c.budget.toFixed(1) + '억</td>' +
        '<td style="padding:8px 10px;text-align:right;">' + c.bid.toFixed(1) + '억</td>' +
        '<td style="padding:8px 10px;text-align:right;font-weight:800;color:' + (c.sav>=0?'var(--actual)':'var(--miss)') + ';">' + c.sav.toFixed(1) + '억</td>' +
        '<td style="padding:8px 10px;text-align:right;font-weight:800;color:' + (c.rate>=0?'var(--actual)':'var(--miss)') + ';">' + c.rate.toFixed(1) + '%</td>' +
        '<td style="padding:8px 10px;color:var(--sub);">' + c.vendor + '</td>' +
        '</tr>'
      ).join('') +
      '</tbody></table>';
  }

  function renderBDList() {
    const box = $('bd-list-box');
    if(box) box.innerHTML = getBDListHtml();
  }

  /* ══════════ 화면 전환 렌더러 ══════════ */
  function selectGScreen(mountId, D, sid){
    document.querySelectorAll(`#${mountId}-subtabs .sub-tab`).forEach(el=>el.classList.toggle('active', el.id===`${mountId}-tab-${sid}`));
    const cards = D.화면[sid]||[];
    const content = $(`${mountId}-content`);
    if(!content) return;
    const cids = cards.map((_,i)=>`${mountId}-${sid}-c${i}`);
    content.innerHTML = `<div class="panel-grid">`+cards.map((c,i)=>cardHtml(c,cids[i])).join('')+`</div>`;

    cards.forEach((c,i)=>{
      if(c.type==='metrics_c21'){ drawChart21(cids[i]); return; }
      if(c.type==='bd_table'){ renderBDList(); return; }
      if(c.type==='sim'){ renderSim(c, cids[i]); return; }
      if(!c.chart) return;
      const el=$(cids[i]); if(!el) return;
      if(c.chart.kind==='line') lineChart(el, c.chart.series, c.chart.maxY, c.chart.labels, c.chart);
      else if(c.chart.kind==='bar') barChart(el, c.chart.data, c.chart.labels, c.chart.color);
    });
  }

  /* ── 미분양 손실 시뮬레이터 (현장별 표) ── */
  function renderSim(card, cid){
    const 현장 = card.현장;
    const fmt = v => Math.round(v).toLocaleString();
    function calc(rate){
      return 현장.map(s=>{
        const 미분양 = s.도급 * (1 - s.분양률/100);
        const 손실 = 미분양 * rate/100;
        return { ...s, 미분양, 손실 };
      });
    }
    function update(rate){
      const rows = calc(rate);
      const 총미분양 = rows.reduce((a,r)=>a+r.미분양,0);
      const 총손실 = rows.reduce((a,r)=>a+r.손실,0);
      const 총도급 = rows.reduce((a,r)=>a+r.도급,0);

      const unsoldEl = $(`${cid}-unsold`);
      if(unsoldEl) unsoldEl.textContent = `${fmt(총미분양)}억 (${(총미분양/총도급*100).toFixed(1)}%)`;
      const lossEl = $(`${cid}-loss`);
      if(lossEl) lossEl.textContent = `${fmt(총손실)}억원`;

      card.할인율.forEach(r=> { const b=$(`${cid}-b-${r}`); if(b) b.classList.toggle('active', r===rate); });

      const tbody = $(`${cid}-tbody`);
      if(!tbody) return;
      const sorted = [...rows].sort((a,b)=>b.손실-a.손실);
      const maxLoss = Math.max(...sorted.map(r=>r.손실), 1);

      tbody.innerHTML = sorted.map(r=>{
        const pct = Math.round(r.손실/maxLoss*100);
        const lossTxt = r.손실>0 ? `-${fmt(r.손실)}억` : '0억';
        return `<tr>
          <td style="font-weight:700;">${r.name}</td>
          <td>${r.cat}</td>
          <td class="num">${fmt(r.도급)}억</td>
          <td class="num">${r.분양률}%</td>
          <td class="num danger" style="font-weight:700;">${fmt(r.미분양)}억</td>
          <td class="num danger" style="font-weight:800;color:var(--miss);">${lossTxt}</td>
          <td style="width:140px;">
            <div style="background:var(--bg);height:8px;border-radius:4px;overflow:hidden;">
              <div style="background:var(--miss);height:100%;width:${pct}%;"></div>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    const btns = $(`${cid}-btns`);
    if(btns){
      btns.innerHTML = `<span class="scn-lbl">할인율 시나리오 (전 현장 일괄 적용)</span>` +
        card.할인율.map(r=>`<button class="scn-btn${r===15?' active':''}" id="${cid}-b-${r}" onclick="window._simUpd['${cid}'](${r})">${r}% 할인</button>`).join('');
    }

    window._simUpd = window._simUpd || {};
    window._simUpd[cid] = update;
    update(15);
  }

  /* ── 수주 iframe 높이 동적 맞춤 ── */
  function fitIframe(){
    const f = $('iframe-수주');
    if(!f) return;
    try {
      const doc = f.contentWindow ? f.contentWindow.document : f.contentDocument;
      if(!doc) return;
      const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
      f.style.height = h + 'px';
    } catch(e){}
  }
  window.addEventListener('resize', fitIframe);

  /* ══════════ 초기화 ══════════ */
  buildMainTabs();
  renderGeneric('mount-2', GONGJEONG);
  renderGeneric('mount-3', JAGEUM);
  renderGeneric('mount-4', IIK);
  renderGeneric('mount-5', UNYEONG);
  selectMain(1);
</script>
